databases:
  - name: copikon-db
    plan: free
    databaseName: copikon
    user: copikon

services:
  - type: web
    name: copikon-server
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: DATABASE_URL
        fromDatabase:
          name: copikon-db
          property: connectionString
